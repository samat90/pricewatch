<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PriceWatch — анализ цен на продукты{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏷️%3C/text%3E%3C/svg%3E">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top navbar-dark pw-navbar shadow-sm">
  <div class="container-fluid px-lg-4">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <span class="brand-mark">🏷️</span>
      <span class="ms-2 fw-bold">PriceWatch</span>
      <span class="ms-2 small text-white-50 d-none d-md-inline">анализ цен на продукты</span>
    </a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door"></i> Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="/search"><i class="bi bi-search"></i> Поиск</a></li>
        <li class="nav-item"><a class="nav-link" href="/analytics"><i class="bi bi-bar-chart"></i> Аналитика</a></li>
        <li class="nav-item"><a class="nav-link" href="/stores"><i class="bi bi-shop"></i> Магазины</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin"><i class="bi bi-gear"></i> Админ</a></li>
      </ul>
      <form class="d-flex gap-2 align-items-center" action="/search" method="get">
        <span id="pw-status" class="pw-live-badge" title="Автообновление каждые 30 минут">
          <span class="pw-live-dot"></span>
          <span id="pw-status-text">загрузка…</span>
        </span>
        <input name="q" type="search" class="form-control" placeholder="Поиск товара..." value="{{ q|default('') }}">
        <button class="btn btn-light" type="submit"><i class="bi bi-search"></i></button>
      </form>
    </div>
  </div>
</nav>

<main class="container-fluid px-lg-4 py-4">
  {% block content %}{% endblock %}
</main>

<footer class="pw-footer mt-5 py-4">
  <div class="container-fluid px-lg-4 small text-center text-white-50">
    {{ now.year }} ОшГУ
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
